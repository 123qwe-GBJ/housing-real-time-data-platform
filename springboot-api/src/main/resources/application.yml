server:
  port: 8080

spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/housing_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&useUnicode=true&serverTimezone=Asia/Shanghai"
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa: # 如果你不用JPA，可删除该节点；如果用，保留即可（和MyBatis不冲突）
    hibernate:
      ddl-auto: update
    show-sql: true

mybatis:
  mapper-locations: classpath:mapper/*.xml # 正确：指定Mapper.xml文件路径
  config-location: classpath:mybatis-config.xml # 可选：指定简化后的mybatis-config.xml路径